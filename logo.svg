<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="mac-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB703" />
      <stop offset="100%" stop-color="#FB8500" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#023047" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="20" fill="url(#bg-grad)" />

  <!-- Pattern overlay -->
  <g opacity="0.05">
    <path d="M0,50 L800,50 M0,100 L800,100 M0,150 L800,150 M0,200 L800,200 M0,250 L800,250 M0,300 L800,300 M0,350 L800,350" stroke="#ffffff" stroke-width="1" />
    <path d="M100,0 L100,400 M200,0 L200,400 M300,0 L300,400 M400,0 L400,400 M500,0 L500,400 M600,0 L600,400 M700,0 L700,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Stylized Macaroni / M / Code Bracket Logo -->
  <g transform="translate(100, 120)" filter="url(#glow)">
    <!-- Left curve -->
    <path d="M40,160 C40,80 80,40 120,40 C140,40 160,50 175,70" fill="none" stroke="url(#mac-grad)" stroke-width="40" stroke-linecap="round" />
    <!-- Middle peak (M) -->
    <path d="M175,70 L210,130 L245,70" fill="none" stroke="url(#mac-grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Right curve -->
    <path d="M245,70 C260,50 280,40 300,40 C340,40 380,80 380,160" fill="none" stroke="url(#mac-grad)" stroke-width="40" stroke-linecap="round" />
  </g>

  <!-- Typography -->
  <g transform="translate(480, 185)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-1">Mackeroni</text>
    <text x="0" y="60" font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="42" font-weight="400" fill="#FFB703" letter-spacing="2">SKILLS</text>
  </g>

  <!-- Decorative terminal prompt -->
  <g transform="translate(480, 280)" opacity="0.6">
    <path d="M0,0 L15,15 L0,30" fill="none" stroke="#219EBC" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="30" y="24" width="20" height="6" fill="#219EBC" />
  </g>
</svg>